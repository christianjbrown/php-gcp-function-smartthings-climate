openapi: 3.0.0
info:
  title: 'SmartThings Climate Cloud Function'
  description: 'Reads the current temperature and relative humidity from the SmartThings devices in a fixed location and returns them as a single JSON envelope.'
  version: 1.0.0
paths:
  /:
    get:
      summary: 'Get the current climate readings for the configured location.'
      description: "Returns the current temperature and relative humidity readings for the SmartThings devices in the function's configured location."
      operationId: getClimate
      responses:
        '200':
          description: 'The current climate readings for the configured location.'
          headers:
            Access-Control-Allow-Methods:
              description: 'Allowed CORS methods.'
              schema:
                type: string
            Access-Control-Allow-Origin:
              description: 'Configured allowed origin (present when a required origin is configured).'
              schema:
                type: string
            Cache-Control:
              description: 'CDN/browser cache directives (present when cache TTLs are configured).'
              schema:
                type: string
            Surrogate-Control:
              description: 'Surrogate cache directives (present when cache TTLs are configured).'
              schema:
                type: string
            Vary:
              description: 'Vary list (present when a required origin is configured).'
              schema:
                type: string
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/SuccessEnvelope' }
                  - { properties: { data: { description: 'The current climate readings, one entry per SmartThings device that exposes a temperature or relative-humidity measurement, sorted by device name.', type: array, items: { $ref: '#/components/schemas/DeviceReading' } } }, type: object }
              example:
                data:
                  - { name: Button, roomName: 'Living Room', temperatureValue: 25.1, temperatureTimestamp: 1784571323, temperatureStale: false }
                  - { name: Button, roomName: Office, temperatureValue: 24.8, temperatureTimestamp: 1784567960, temperatureStale: false }
                  - { name: 'Door sensor', roomName: Hallway, temperatureValue: 22.3, temperatureTimestamp: 1784571388, temperatureStale: false }
                  - { name: Hygrometer, roomName: Bedroom, temperatureValue: 24.5, temperatureTimestamp: 1784566164, temperatureStale: false, humidityValue: 43, humidityTimestamp: 1784570405, humidityStale: false }
                  - { name: 'Motion sensor', roomName: Hallway, temperatureValue: 25.9, temperatureTimestamp: 1784571267, temperatureStale: false }
                  - { name: 'Motion sensor', roomName: 'Living Room', temperatureValue: 25.1, temperatureTimestamp: 1784570955, temperatureStale: false }
                success: true
                timestamp_iso8601: '2026-07-20T18:19:48+00:00'
                timestamp_unix: 1784571588
                version: get-smartthings-climate-00058-gxq
        '401':
          description: 'The request failed header authorization.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: 'An unhandled error occurred: the OAuth refresh-token flow failed (e.g. a revoked refresh token returning invalid_grant), the token store could not be reached, the upstream SmartThings API failed, or the response could not be encoded.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
      servers:
        -
          url: /
components:
  schemas:
    DeviceReading:
      description: "One device's readings. The device name is always present; the room name and each measurement block (value/timestamp/stale) appear only when that value is available. A whole-valued measurement is serialised without a decimal point, so its type is `number`, not `integer`."
      required:
        - name
      properties:
        name:
          description: 'The device label.'
          type: string
        roomName:
          description: 'The name of the room the device is in.'
          type: string
        temperatureValue:
          description: "The temperature reading, in the device's reported unit."
          type: number
        temperatureTimestamp:
          description: 'When the temperature was read (Unix seconds).'
          type: integer
        temperatureStale:
          description: 'Whether the temperature reading is older than the stale threshold.'
          type: boolean
        humidityValue:
          description: 'The relative humidity reading (percent).'
          type: number
        humidityTimestamp:
          description: 'When the humidity was read (Unix seconds).'
          type: integer
        humidityStale:
          description: 'Whether the humidity reading is older than the stale threshold.'
          type: boolean
      type: object
      additionalProperties: false
    ErrorEnvelope:
      description: 'The complete JSON error envelope returned by every consuming function for a failed request (an authorization failure or an unhandled error). Identical for every function.'
      required:
        - success
        - timestamp_unix
        - timestamp_iso8601
        - version
        - error
      properties:
        success:
          description: 'Always false for an error response.'
          type: boolean
          enum:
            - false
        timestamp_unix:
          description: 'When the response was generated (Unix seconds).'
          type: integer
        timestamp_iso8601:
          description: 'When the response was generated (ISO 8601).'
          type: string
          format: date-time
        version:
          description: 'The Cloud Run revision that produced the response.'
          type: string
        error:
          description: 'A human-readable description of what went wrong.'
          type: string
      type: object
      additionalProperties: false
    SuccessEnvelope:
      description: 'The shared base of the JSON success envelope returned by every consuming function. The `data` property is a generic, untyped payload placeholder — a function tightens it to its own object or array schema by composing this base with `allOf`, e.g. `allOf: [{$ref: "#/components/schemas/SuccessEnvelope"}, {properties: {data: {$ref: "#/components/schemas/YourData"}}}]`. It is omitted from `required` because a function with an empty payload emits no `data` key at all.'
      required:
        - success
        - timestamp_unix
        - timestamp_iso8601
        - version
      properties:
        success:
          description: 'Always true for a success response.'
          type: boolean
          enum:
            - true
        timestamp_unix:
          description: 'When the response was generated (Unix seconds).'
          type: integer
        timestamp_iso8601:
          description: 'When the response was generated (ISO 8601).'
          type: string
          format: date-time
        version:
          description: 'The Cloud Run revision that produced the response.'
          type: string
        data:
          description: 'The function-specific payload (object or array). Each function overrides this via `allOf` with its own data schema.'
      type: object
      additionalProperties: false
