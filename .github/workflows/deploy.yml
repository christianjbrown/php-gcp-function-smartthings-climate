name: Deploy

on:
  push:
    branches: ['main']
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

jobs:
  deploy:
    name: 'Deploy Cloud Function'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v5'

      - name: 'Authenticate with GCP'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/${{ vars.GCP_PROJECT_ID }}/locations/global/workloadIdentityPools/${{ vars.GCP_WIF_POOL }}/providers/${{ vars.GCP_WIF_PROVIDER }}'
          service_account: '${{ vars.GCP_SERVICE_ACCOUNT }}'

      - name: 'Create or update Cloud Function'
        id: 'deploy'
        uses: 'google-github-actions/deploy-cloud-functions@v4'
        with:
          name: '${{ vars.GCP_CLOUD_FUNCTION_ENDPOINT }}'
          runtime: 'php83'
          entry_point: 'run'
          region: 'europe-west2'
          memory: '128Mi'
          min_instance_count: 0
          max_instance_count: 1
          service_timeout: '60s'
          ingress_settings: 'ALLOW_ALL'
          build_environment_variables: 'COMPOSER_AUTH=${{ secrets.COMPOSER_AUTH }}'
          environment_variables: 'USE_CACHE_TTL=300,USE_CACHE_BUT_REQUEST_TTL=600,USE_CACHE_IF_ERROR_TTL=3600,REQUIRED_HEADER_KEY=X-Request-Auth,REQUIRED_ORIGIN=${{ vars.REQUIRED_ORIGIN }}'
          secrets: |-
            SMARTTHINGS_API_TOKEN=projects/${{ vars.GCP_PROJECT_ID }}/secrets/SMARTTHINGS_API_TOKEN/versions/latest
            SMARTTHINGS_LOCATION_ID=projects/${{ vars.GCP_PROJECT_ID }}/secrets/SMARTTHINGS_LOCATION_ID/versions/latest
            REQUIRED_HEADER_VALUE=projects/${{ vars.GCP_PROJECT_ID }}/secrets/FASTLY_REQUIRED_HEADER_VALUE/versions/latest

      # Gen2 functions are backed by Cloud Run and are NOT public by default.
      # Gen1 forced HTTPS via `https_trigger_security_level`; on Gen2 public
      # reachability is an IAM binding on the underlying Cloud Run service.
      # Requires the deploy service account to have `roles/run.admin` (or a role
      # granting `run.services.setIamPolicy`) and the Cloud Run Admin API enabled.
      - name: 'Allow unauthenticated invocations'
        run: |
          gcloud run services add-iam-policy-binding "${{ vars.GCP_CLOUD_FUNCTION_ENDPOINT }}" \
            --region='europe-west2' \
            --member='allUsers' \
            --role='roles/run.invoker'

      - name: 'Test Cloud Function'
        run: 'curl "${{ steps.deploy.outputs.url }}"'
