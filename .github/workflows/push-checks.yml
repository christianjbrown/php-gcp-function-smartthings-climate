on:
  pull_request:
    branches: ['main']

jobs:
  on-push-checks:
    name: "On-push checks"
    runs-on: "ubuntu-latest"

    # The composer scripts prefix commands with `clear`, which needs TERM set;
    # GitHub runners don't set it, so provide one to keep the scripts working.
    env:
      TERM: "xterm"

    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v4"

      - name: "Install dependencies"
        env:
          COMPOSER_AUTH: '${{ secrets.COMPOSER_AUTH }}'
        run: 'composer update'

      - name: "Run PHPCS checks"
        run: "composer check-style"

      - name: "Run PHPUnit tests"
        env:
          XDEBUG_MODE: "coverage"
        run: "./bin/phpunit"
