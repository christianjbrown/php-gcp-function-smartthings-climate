name: Docs

# Publishes the OpenAPI docs (Redoc) to GitHub Pages. openapi.yaml is generated
# from the #[OA\...] attributes in src/; redocly.yaml scopes the lint/build config.
# Not part of the PHP runtime or the GCP deploy.
on:
  push:
    branches: [main]
    paths:
      - 'openapi.yaml'
      - 'redocly.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build Redoc docs
        run: npx redocly build-docs openapi.yaml --output _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
