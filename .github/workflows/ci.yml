name: CI

on:
  pull_request:
    branches: ['main']
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

jobs:
  on-push-checks:
    name: "On-push checks"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v5"

      - name: "Install dependencies"
        env:
          COMPOSER_AUTH: '${{ secrets.COMPOSER_AUTH }}'
        run: 'composer update'

      - name: "Run PHPCS checks"
        run: "./bin/php-cs ./src ./tests"

      - name: "Run PHPUnit tests"
        env:
          XDEBUG_MODE: "coverage"
        run: "./bin/phpunit"
